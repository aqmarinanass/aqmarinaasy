<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Pesan Spesial Untukmu!</title>
    <style>
        /* Gaya Visual ala Scratch (Cerah dan Blok) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: {{BACKGROUND_COLOR}};
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 0px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 4px solid #4C97FF; /* Warna biru khas Scratch */
        }
        .badge {
            background-color: #FF6680; /* Warna pink khas Scratch */
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 14px;
        }
        h1 {
            color: #4C97FF;
            font-size: 24px;
            margin-bottom: 15px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
            white-space: pre-wrap; /* Menjaga enter teks tetap rapi */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">{{TEMA}}</div>
        <h1>{{JUDUL}}</h1>
        <hr style="border: 1px solid #eee; margin: 20px 0;">
        <p>"{{PESAN}}"</p>
    </div>

</body>
</html>
